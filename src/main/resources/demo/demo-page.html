<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selenium Demo Page</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: linear-gradient(135deg, #f3efe6, #d9e7f2);
      color: #1f2933;
    }

    main {
      max-width: 760px;
      margin: 80px auto;
      padding: 40px;
      background: rgba(255, 255, 255, 0.92);
      border: 2px solid #1f2933;
      box-shadow: 12px 12px 0 #c8b48a;
    }

    h1 {
      margin-top: 0;
      font-size: 38px;
    }

    p {
      font-size: 20px;
      line-height: 1.5;
    }

    button {
      padding: 14px 22px;
      border: 0;
      background: #1f2933;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
    }

    #status {
      margin-top: 24px;
      font-weight: bold;
      color: #8b1e3f;
    }
  </style>
</head>
<body>
<main>
  <h1>Тестовая страница Selenium</h1>
  <p>Эта страница нужна, чтобы проверить, что WebDriver вообще запускает браузер, открывает страницу и нажимает кнопку.</p>
  <button type="button" data-test="demo-button" onclick="document.getElementById('status').textContent='Кнопка нажата';">
    Нажми меня
  </button>
  <div id="status">Ожидаем действие</div>
</main>
</body>
</html>
